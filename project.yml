# xcodegen project spec.
# Run `xcodegen generate` (locally or in CI) to produce HomeboxCatalog.xcodeproj.
name: HomeboxCatalog
# Bundle id stays "com.homeboxcatalog.app" so AltStore reinstalls update the existing
# app in place instead of treating the rename as a different app.
options:
  bundleIdPrefix: com.homeboxcatalog
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""

targets:
  HomeboxCatalog:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "**/*.md"
          - "project.yml"
          - ".github/**"
          - ".git/**"
          - "build/**"
          - "android/**"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: HomeBoy
        CFBundleShortVersionString: "1.0.98"
        CFBundleVersion: "99"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Allow plaintext HTTP to self-hosted Homebox on LAN (e.g. http://192.168.x.x:3100).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "HomeBoy uses the camera to photograph items and to scan product barcodes and Homebox QR codes."
        NSPhotoLibraryUsageDescription: "Pick a photo from your library to attach to an item in Homebox."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homeboxcatalog.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
