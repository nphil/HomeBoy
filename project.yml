# xcodegen project spec.
# Run `xcodegen generate` (locally or in CI) to produce HomeboxCatalog.xcodeproj.
name: HomeboxCatalog
# Bundle id stays "com.homeboxcatalog.app" so AltStore reinstalls update the existing
# app in place instead of treating the rename as a different app.
options:
  bundleIdPrefix: com.homeboxcatalog
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""

targets:
  HomeboxCatalog:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "**/*.md"
          - "project.yml"
          - ".github/**"
          - ".git/**"
          - "build/**"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: HomeBoy
        CFBundleShortVersionString: "1.0.10"
        CFBundleVersion: "11"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Allow plaintext HTTP to self-hosted Homebox on LAN (e.g. http://192.168.x.x:3100).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSCameraUsageDescription: "Take a photo of an item to attach to its Homebox record."
        NSPhotoLibraryUsageDescription: "Pick a photo from your library to attach to an item in Homebox."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homeboxcatalog.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
