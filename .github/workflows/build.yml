name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: macos-15

    env:
      SCHEME:       HomeboxCatalog
      PROJECT:      HomeboxCatalog.xcodeproj
      ARCHIVE_PATH: build/HomeboxCatalog.xcarchive

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          CURRENT=$(python3 -c "import plistlib; print(plistlib.load(open('Info.plist','rb'))['CFBundleShortVersionString'])")
          BUILD=$(python3 -c "import plistlib; print(plistlib.load(open('Info.plist','rb'))['CFBundleVersion'])")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VER="$MAJOR.$MINOR.$((PATCH + 1))"
          NEW_BUILD="$((BUILD + 1))"
          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "build=$NEW_BUILD"  >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VER"     >> "$GITHUB_OUTPUT"

      - name: Update version in source files
        run: |
          python3 - <<PYEOF
          import plistlib, re
          ver   = "${{ steps.ver.outputs.version }}"
          build = "${{ steps.ver.outputs.build }}"

          with open('Info.plist', 'rb') as f:
              p = plistlib.load(f)
          p['CFBundleShortVersionString'] = ver
          p['CFBundleVersion'] = build
          with open('Info.plist', 'wb') as f:
              plistlib.dump(p, f, fmt=plistlib.FMT_XML)

          with open('project.yml') as f:
              text = f.read()
          text = re.sub(r'CFBundleShortVersionString:\s*"[^"]*"',
                        f'CFBundleShortVersionString: "{ver}"', text)
          text = re.sub(r'CFBundleVersion:\s*"[^"]*"',
                        f'CFBundleVersion: "{build}"', text)
          with open('project.yml', 'w') as f:
              f.write(text)
          print(f"Bumped to {ver} (build {build})")
          PYEOF

      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" \
            -scheme  "$SCHEME"

      - name: Archive (unsigned)
        run: |
          xcodebuild archive \
            -project      "$PROJECT" \
            -scheme       "$SCHEME" \
            -configuration Release \
            -destination  "generic/platform=iOS" \
            -archivePath  "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            SKIP_INSTALL=NO \
            INSTALL_PATH="/Applications" \
            | xcpretty || exit ${PIPESTATUS[0]}

      - name: Package into IPA
        run: |
          APP_PATH=$(find "$ARCHIVE_PATH" \
            -name "*.app" \
            ! -name "*.xctest" \
            ! -path "*/SwiftSupport/*" \
            2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found in archive:"
            find "$ARCHIVE_PATH" -maxdepth 6 2>/dev/null || echo "(archive missing)"
            exit 1
          fi

          echo "✅ Found: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r HomeboxCatalog.ipa Payload/
          echo "IPA size: $(du -sh HomeboxCatalog.ipa | cut -f1)"

      - name: Commit version bump, tag, and publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          SHORT_SHA="${GITHUB_SHA::7}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Info.plist project.yml
          git commit -m "chore: bump version to ${{ steps.ver.outputs.version }} [skip ci]"

          # Rebase in case main advanced while we were building, then push
          git fetch origin main
          git rebase origin/main
          git push origin main

          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            HomeboxCatalog.ipa \
            --title "$TAG" \
            --notes "Unsigned IPA — sideload with AltStore. Built from \`$SHORT_SHA\` on $(date -u +'%Y-%m-%d %H:%M UTC')"
