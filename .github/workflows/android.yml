name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Bump version
        id: version
        run: |
          BUILD_FILE="android/app/build.gradle.kts"

          CODE=$(grep -oP 'versionCode = \K\d+' "$BUILD_FILE")
          NAME=$(grep -oP 'versionName = "\K[^"]+' "$BUILD_FILE")

          NEW_CODE=$((CODE + 1))
          MAJOR=$(echo "$NAME" | cut -d. -f1)
          MINOR=$(echo "$NAME" | cut -d. -f2)
          PATCH=$(echo "$NAME" | cut -d. -f3)
          NEW_NAME="$MAJOR.$MINOR.$((PATCH + 1))"

          sed -i "s/versionCode = $CODE/versionCode = $NEW_CODE/" "$BUILD_FILE"
          sed -i "s/versionName = \"$NAME\"/versionName = \"$NEW_NAME\"/" "$BUILD_FILE"

          echo "code=$NEW_CODE"   >> "$GITHUB_OUTPUT"
          echo "name=$NEW_NAME"   >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_NAME ($NEW_CODE)"

      # Signed release build — the keystore is committed to the repo so the
      # signature is identical across builds (no mismatch on update).
      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease

      - name: Rename APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          OUT="HomeBoy-android-v${{ steps.version.outputs.name }}.apk"
          cp "$APK" "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      # Versioned release (one per build) so Obtainium can detect updates.
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.version.outputs.name }}
          name: "HomeBoy Android v${{ steps.version.outputs.name }}"
          prerelease: false
          make_latest: false
          files: ${{ steps.apk.outputs.path }}
          body: |
            Signed release APK for sideloading.

            **Version:** ${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }})

            **Obtainium:** add `https://github.com/nphil/HomeBoy` as a GitHub source
            with release-title filter `Android` — see the README for a one-tap link.

            **Manual install:** `adb install -r HomeBoy-android-v${{ steps.version.outputs.name }}.apk`
            or open the APK on-device (enable "Install from unknown sources").

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle.kts
          git commit -m "chore: bump Android version to ${{ steps.version.outputs.name }} [skip ci]"
          # Another push (e.g. a concurrent commit to main) may have landed while
          # this build ran. Rebase the bump on top and retry so the version always
          # increments — otherwise Obtainium stops detecting updates.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed version bump on attempt $attempt"
              exit 0
            fi
            echo "Push rejected, rebasing and retrying ($attempt)…"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((attempt * 3))
          done
          echo "Failed to push version bump after retries" >&2
          exit 1
