name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Bump version
        id: version
        run: |
          BUILD_FILE="android/app/build.gradle.kts"

          # Read current values
          CODE=$(grep -oP 'versionCode = \K\d+' "$BUILD_FILE")
          NAME=$(grep -oP 'versionName = "\K[^"]+' "$BUILD_FILE")

          NEW_CODE=$((CODE + 1))
          MAJOR=$(echo "$NAME" | cut -d. -f1)
          MINOR=$(echo "$NAME" | cut -d. -f2)
          PATCH=$(echo "$NAME" | cut -d. -f3)
          NEW_NAME="$MAJOR.$MINOR.$((PATCH + 1))"

          sed -i "s/versionCode = $CODE/versionCode = $NEW_CODE/" "$BUILD_FILE"
          sed -i "s/versionName = \"$NAME\"/versionName = \"$NEW_NAME\"/" "$BUILD_FILE"

          echo "code=$NEW_CODE"   >> "$GITHUB_OUTPUT"
          echo "name=$NEW_NAME"   >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_NAME ($NEW_CODE)"

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Rename APK
        run: |
          cp "${{ steps.apk.outputs.path }}" "HomeBoy-android-v${{ steps.version.outputs.name }}.apk"

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "HomeBoy Android v${{ steps.version.outputs.name }}"
          prerelease: true
          files: "HomeBoy-android-v${{ steps.version.outputs.name }}.apk"
          body: |
            Auto-built Android APK — sideload with ADB or your sideloading tool.

            **Version:** ${{ steps.version.outputs.name }} (build ${{ steps.version.outputs.code }})

            **Install:**
            ```
            adb install HomeBoy-android-v${{ steps.version.outputs.name }}.apk
            ```
            Or open the APK directly on your device (enable "Install from unknown sources").

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle.kts
          git commit -m "chore: bump Android version to ${{ steps.version.outputs.name }} [skip ci]"
          git push origin HEAD:main
